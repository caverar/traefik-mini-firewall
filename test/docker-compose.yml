services:
  traefik:
    image: traefik:latest
    command:
      - "--log.level=DEBUG"
      - "--configfile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik.yml:/etc/traefik/traefik.yml
      - ./dynamic_conf.yml:/etc/traefik/dynamic_conf.yml
      - ../:/plugins-local/src/github.com/caverar/traefik-mini-firewall
    networks:
      - test-net

  whoami:
    image: traefik/whoami
    networks:
      - test-net

networks:
  test-net:
    driver: bridge